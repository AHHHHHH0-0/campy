name: CheckIt
options:
  bundleIdPrefix: ai.checkit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  ZeticMLangeiOS:
    url: https://github.com/zetic-ai/ZeticMLangeiOS.git
    exactVersion: 1.6.0

targets:
  CheckIt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: ios/CheckIt/Config/Secrets.xcconfig
      Release: ios/CheckIt/Config/Secrets.xcconfig
    sources:
      - path: ios/CheckIt
        excludes:
          - "Config/Secrets.xcconfig"
          - "Config/Secrets.xcconfig.example"
          - "Resources/SeedPacks"
          - "**/*.md"
      - path: ios/CheckIt/Resources/SeedPacks
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.checkit.CheckIt
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/CheckIt/Info.plist
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: ZeticMLangeiOS
        product: ZeticMLange
